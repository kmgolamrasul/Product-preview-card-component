<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <div class="container">

      <img class="img-desktop" src="./images/image-product-desktop.jpg" alt="perfume-desktop">
      <img class="img-mobile" src="./images/image-product-mobile.jpg" alt="perfume-mobile">

      <div class="content">
        <p class="item">Perfume</p>
        <p class="item-name">Gabrielle Essence Eau De Parfum</p>
        <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p> 

        <div class="price">
          <p class="price-rl">$149.99</p>
          <p class="price-st">$169.99</p> 
        </div>

        <button class="btn"><img src="./images/icon-cart.svg" alt="icon">Add to Cart</button>
      </div>

    </div> 
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Km Golam Rasul</a>.
  </footer>

</body>
</html>
